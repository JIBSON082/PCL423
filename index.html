<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaKinetics · Flashcard Lab</title>
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app-container {
      max-width: 850px;
      width: 100%;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(4px);
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      padding: 24px 28px 36px;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.4);
    }

    h1, h2, h3 {
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .greeting-section, .topic-selector, .mode-selector, .quiz-area, .result-area {
      transition: all 0.3s ease;
    }

    .hidden {
      display: none !important;
    }

    /* name / greeting */
    .greeting-card {
      background: white;
      border-radius: 40px;
      padding: 32px 28px;
      box-shadow: 0 8px 20px rgba(0,20,50,0.06);
      text-align: center;
    }

    .greeting-card input {
      border: 1px solid #d0d9e8;
      border-radius: 60px;
      padding: 16px 24px;
      font-size: 1.2rem;
      width: 70%;
      max-width: 320px;
      outline: none;
      transition: 0.2s;
      background: #fafbff;
    }

    .greeting-card input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
    }

    .btn-primary {
      background: #1e293b;
      border: none;
      color: white;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 60px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 6px 12px rgba(0,0,0,0.04);
      margin-top: 16px;
    }

    .btn-primary:hover {
      background: #0f172a;
      transform: scale(1.02);
    }

    .btn-secondary {
      background: #eef2f6;
      border: none;
      color: #1e293b;
      font-weight: 500;
      padding: 12px 28px;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .topic-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin: 24px 0 12px;
    }

    .topic-btn {
      background: white;
      border: 1px solid #dce3ed;
      padding: 18px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      flex: 1 0 200px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }

    .topic-btn.active {
      background: #1e293b;
      color: white;
      border-color: #1e293b;
      box-shadow: 0 12px 20px -12px rgba(0,0,0,0.3);
    }

    .mode-card {
      background: white;
      border-radius: 32px;
      padding: 24px;
      margin: 16px 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #e9edf4;
    }

    .mode-badge {
      background: #dbeafe;
      padding: 6px 18px;
      border-radius: 60px;
      color: #1e4cbf;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .mode-btn-group {
      display: flex;
      gap: 12px;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid #cdd7e6;
      padding: 10px 22px;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }

    .mode-btn.active-mode {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .flashcard {
      background: white;
      border-radius: 40px;
      padding: 32px 24px;
      margin: 20px 0 20px;
      box-shadow: 0 12px 28px -8px rgba(0,0,0,0.06);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      border: 1px solid #eef2f8;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0 12px;
    }

    .option-item {
      background: #f8fafc;
      padding: 14px 18px;
      border-radius: 60px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: 0.1s;
      font-weight: 500;
    }

    .option-item:hover {
      background: #eef2f6;
      border-color: #b9c7da;
    }

    .option-item.selected-correct {
      background: #d1fae5;
      border-color: #10b981;
    }

    .option-item.selected-wrong {
      background: #fee2e2;
      border-color: #ef4444;
    }

    .option-item.disabled {
      pointer-events: none;
      opacity: 0.7;
    }

    .short-answer-box {
      background: #f8fafc;
      border-radius: 30px;
      padding: 20px;
      margin: 12px 0;
      border: 1px solid #e2e8f0;
    }

    .short-answer-box textarea {
      width: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 70px;
      outline: none;
      padding: 6px 0;
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .progress-indicator {
      font-weight: 500;
      background: #eef2f6;
      padding: 6px 18px;
      border-radius: 60px;
      color: #1e293b;
    }

    .result-stats {
      background: #f1f5f9;
      border-radius: 40px;
      padding: 24px;
      margin: 20px 0;
      text-align: center;
    }

    .footer-note {
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 24px;
    }

    .restart-btn {
      background: none;
      border: 1px solid #cbd5e1;
      padding: 8px 20px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 500;
    }

    @media (max-width: 550px) {
      .app-container { padding: 16px; }
      .options-grid { grid-template-columns: 1fr; }
      .greeting-card input { width: 100%; }
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">

  <!-- GREETING / NAME -->
  <div id="greetingSection" class="greeting-section">
    <div class="greeting-card">
      <i class="fas fa-capsules" style="font-size: 2.8rem; color: #2563eb; margin-bottom: 12px; display: block;"></i>
      <h2 style="margin-bottom: 8px;">Clinical Pharmacokinetics</h2>
      <p style="color: #475569; margin-bottom: 24px;">Enter your name to begin your revision</p>
      <input type="text" id="userNameInput" placeholder="e.g. Alex" value="">
      <button class="btn-primary" id="enterNameBtn"><i class="fas fa-arrow-right" style="margin-right: 8px;"></i>Start Learning</button>
    </div>
  </div>

  <!-- MAIN DASHBOARD (after name) -->
  <div id="mainDashboard" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <h3 style="display: flex; align-items: center; gap: 8px;"><i class="fas fa-user-md" style="color: #2563eb;"></i> <span id="displayUserName">Student</span></h3>
      <button id="resetProgressBtn" class="restart-btn"><i class="fas fa-undo-alt"></i> Reset progress</button>
    </div>

    <!-- TOPIC SELECTOR (two slides) -->
    <div class="topic-selector">
      <p style="font-weight: 500; margin-bottom: 8px; color: #334155;">Choose your topic:</p>
      <div class="topic-grid">
        <button class="topic-btn" data-topic="0">📘 PCL 423 Compiled</button>
        <button class="topic-btn" data-topic="1">🧪 Clinical PK · Olugbake</button>
      </div>
    </div>

    <!-- MODE & QUIZ AREA -->
    <div id="modeAndQuizArea">
      <div class="mode-card">
        <span><i class="fas fa-bolt" style="color: #2563eb;"></i> <strong>Mode</strong></span>
        <div class="mode-btn-group">
          <button class="mode-btn active-mode" data-mode="short">📝 Short Answer</button>
          <button class="mode-btn" data-mode="mcq">🎯 MCQ</button>
        </div>
      </div>

      <div id="quizContainer" class="quiz-area">
        <!-- flashcard injected here -->
        <div id="flashcardWrapper"></div>
        <div class="action-row">
          <span class="progress-indicator" id="progressDisplay">0 / 0</span>
          <div>
            <button class="btn-secondary" id="prevQuestionBtn" style="margin-right: 8px;"><i class="fas fa-chevron-left"></i> Prev</button>
            <button class="btn-primary" id="nextQuestionBtn" style="padding: 12px 28px;">Next <i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
      </div>

      <div id="resultArea" class="result-area hidden">
        <div class="result-stats">
          <i class="fas fa-check-circle" style="color: #10b981; font-size: 2.8rem; margin-bottom: 8px;"></i>
          <h3>Well done, <span id="resultName"></span>!</h3>
          <p id="resultMessage" style="font-size: 1.2rem;">You've completed this topic.</p>
          <button class="btn-secondary" id="restartTopicBtn"><i class="fas fa-sync-alt"></i> Restart topic</button>
        </div>
      </div>
    </div>
  </div>
  <div class="footer-note"><i class="fas fa-flask"></i> PK flashcard lab · progress saved locally</div>
</div>

<script>
  (function() {
    // ---------- DATA : two slides ----------
    // Topic 0 : PCL 423 Compiled (from first PDF)
    const topic0Data = [
      { q: "Define pharmacokinetics.", a: "Study of the rate at which processes occur; gives insight into mechanisms and allows prediction of change over time." },
      { q: "What is the order of reaction? How is it expressed?", a: "Number of concentration terms that determine rate. For A+B→C+D, rate = k[A]^x[B]^y; overall order = x+y." },
      { q: "What is the rate constant K? Does it depend on concentration?", a: "Proportionality constant in rate law. Independent of concentration, but depends on temperature." },
      { q: "Describe zero‑order reaction and its half‑life.", a: "Rate independent of concentration: -dC/dt = K. Integrated: X = Kt + constant. t½ = C₀/(2K). Units: conc·time⁻¹." },
      { q: "Give examples of zero‑order kinetics.", a: "Vitamin A acetate conversion, photolysis of cefotaxime, colour loss of multi‑sulfa, drug release from IV infusion and TDDS." },
      { q: "What is a first‑order reaction? Write the integrated equation.", a: "Rate depends on first power of concentration. log(a-x) = log a – Kt/2.303. t½ = 0.693/K." },
      { q: "What is t₁₀% and its relation to t½?", a: "Time for 10% degradation: t₁₀% = 0.104/K = 0.152 × t½." },
      { q: "Second‑order reaction: when a = b, what is the integrated form?", a: "Kt = x/[a(a-x)]; rearranged: Kt = 1/(a-x) – 1/a. t½ = 1/(aK)." },
      { q: "What are pseudo‑zero‑order reactions? Give example.", a: "Reactions that appear zero‑order due to constant concentration (e.g., suspension with excess solid drug, moisture in solid dosage)." },
      { q: "What are pseudo‑first‑order reactions?", a: "Bimolecular reaction behaving like first order because one reactant is in excess or constant. e.g., ascorbic acid decomposition, aspirin hydrolysis." },
      { q: "Name three complex reaction types.", a: "Opposing (e.g., tetracycline epimerization), consecutive (e.g., chlorbenzodiazepine degradation), parallel (e.g., insulin deamidation & polymerization)." },
      { q: "How can you determine order of reaction using data plotting?", a: "Plot [C] vs t → linear: zero order; ln C vs t → linear: first order; 1/C vs t → linear: second order." },
      { q: "Define half‑life determination method for order n.", a: "t½ ∝ 1/aⁿ⁻¹. Using two initial concentrations: n = 1 + log(t½1/t½2)/log(a₂/a₁)." },
      { q: "What is apparent volume of distribution (Vd)?", a: "Volume of body fluid required to contain drug uniformly at concentration observed in blood. Vd = Dose/C₀." },
      { q: "What are the assumptions of one‑compartment open model?", a: "Instant and homogeneous distribution; equilibrium between blood and tissues; drug level proportional to plasma concentration." },
      { q: "Two‑compartment model: what do α and β represent?", a: "α = distribution rate constant (rapid phase); β = elimination rate constant (terminal phase)." },
      { q: "How is half‑life computed in two‑compartment model?", a: "From terminal (β) phase: log Cp = log B – βt/2.303; t½ = 0.693/β." },
      { q: "What is the therapeutic window?", a: "Range of plasma concentration that provides efficacy without unacceptable toxicity." },
      { q: "What is bioavailability (F)?", a: "Fraction of administered dose reaching systemic circulation unchanged. IV F=1." },
      { q: "Define bioequivalence.", a: "Absence of significant difference in rate and extent of absorption between two products (generic vs innovator) under similar conditions." },
      { q: "What are the regulatory criteria for bioequivalence (80/125 rule)?", a: "90% CI for ratio of geometric means of AUC and Cmax must fall within 80–125%." },
      { q: "What is Michaelis‑Menten kinetics? When does it reduce to zero‑order?", a: "dC/dt = –Vmax·C/(Km+C). At high C (C>>Km), dC/dt ≈ –Vmax (zero‑order)." },
      { q: "List two causes of nonlinear pharmacokinetics.", a: "Saturation of plasma protein binding (e.g., phenylbutazone); capacity‑limited metabolism (e.g., phenytoin, alcohol)." }
    ];

    // Topic 1 : Clinical PK · Olugbake (second PDF)
    const topic1Data = [
      { q: "What is clinical pharmacokinetics?", a: "Study of time course of drug movement through body; application of PK principles to manage patient therapy and individualize dosing." },
      { q: "What is the difference between pharmacokinetics and pharmacodynamics?", a: "PK = what body does to drug (ADME); PD = what drug does to body (receptor interaction, response)." },
      { q: "Define clearance (CL).", a: "Volume of plasma cleared of drug per unit time. CL = Ke × Vd = Dose/AUC." },
      { q: "What is half‑life (t½)? Write its relation with Ke.", a: "Time for concentration to reduce by 50%. t½ = 0.693/Ke." },
      { q: "What does Vd indicate? What does low/high Vd mean?", a: "Apparent volume of distribution. Low Vd = confined to plasma; high Vd = extensive tissue distribution." },
      { q: "Define Cmax and Tmax.", a: "Cmax = maximum plasma concentration; Tmax = time to reach Cmax (indicates absorption rate and onset)." },
      { q: "What is the therapeutic index / therapeutic window?", a: "Range of drug concentration providing efficacy without adverse effects." },
      { q: "How many half‑lives to reach steady state?", a: "Approximately 5 half‑lives." },
      { q: "What is the main advantage of IV administration?", a: "Rapid response, 100% bioavailability, precise dosing, no absorption delay." },
      { q: "What is a disadvantage of IV bolus?", a: "Risk of 'drug shock', phlebitis, embolism; requires sterile preparation; rapid rise may cause toxicity." },
      { q: "Why is diazepam IV injected slowly?", a: "Poor water solubility; 40% propylene glycol/ethanol vehicle; rapid injection can cause precipitation. 1 mg/min." },
      { q: "What affects absorption from IM site?", a: "Vascularity (deltoid > thigh > buttock), lipid solubility, ionization, volume, osmolality." },
      { q: "Why is subcutaneous injection used for insulin?", a: "Slower absorption, avoids too intense response, allows self‑administration." },
      { q: "What is the first‑pass effect? Which routes avoid it?", a: "Metabolism of drug by liver before reaching systemic circulation. Sublingual, buccal, rectal (partial), inhalation, IV avoid first‑pass." },
      { q: "Give an example of a drug with high first‑pass metabolism.", a: "Propranolol, morphine (oral dose higher than IV due to extensive liver metabolism)." },
      { q: "Why might oral route be unsuitable for unconscious patients?", a: "Risk of aspiration; cannot swallow; alternative routes: IV, IM, rectal, transdermal." },
      { q: "What is the advantage of sublingual route?", a: "Rapid absorption, avoids first‑pass and gastric acid, good for nitroglycerin." },
      { q: "What is the intrathecal route used for?", a: "To deliver drugs directly into CSF or CNS when blood‑brain barrier limits penetration (e.g., chemotherapy, antibiotics)." },
      { q: "Which factors affect bioavailability?", a: "Solubility, lipophilicity, particle size, gastric emptying, GI pH, food, first‑pass metabolism, formulation excipients." },
      { q: "What is the biopharmaceutics classification system (BCS)?", a: "Classifies drugs by solubility and permeability: Class I (high sol/high perm), II (low sol/high perm), III (high sol/low perm), IV (low sol/low perm)." },
      { q: "What does AUC represent?", a: "Total drug exposure over time (area under plasma concentration‑time curve). Used to calculate bioavailability and clearance." },
      { q: "What are pharmaceutical equivalents?", a: "Products with same active ingredient, strength, dosage form, route; may differ in excipients, colour, shape." },
      { q: "What is the role of P‑glycoprotein?", a: "Membrane‑bound efflux transporter; pumps xenobiotics out of cells; overexpression in cancer leads to chemoresistance." },
      { q: "Name two CYP450 isoenzymes with clinical polymorphisms.", a: "CYP2D6 (codeine, tamoxifen), CYP2C9 (warfarin), CYP2C19 (clopidogrel)." }
    ];

    const allTopics = [topic0Data, topic1Data];
    const topicLabels = ['PCL 423 Compiled', 'Clinical PK · Olugbake'];

    // ---------- STATE ----------
    let currentTopicIndex = 0;          // 0 or 1
    let currentMode = 'short';          // 'short' or 'mcq'
    let currentQuestionIndex = 0;
    let userName = '';

    // Progress: { topicIndex: { mode: { answers: [...], index: number } } }
    let progress = {};

    // DOM refs
    const greetingSection = document.getElementById('greetingSection');
    const mainDashboard = document.getElementById('mainDashboard');
    const userNameInput = document.getElementById('userNameInput');
    const enterNameBtn = document.getElementById('enterNameBtn');
    const displayUserName = document.getElementById('displayUserName');
    const topicBtns = document.querySelectorAll('.topic-btn');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const flashcardWrapper = document.getElementById('flashcardWrapper');
    const progressDisplay = document.getElementById('progressDisplay');
    const prevBtn = document.getElementById('prevQuestionBtn');
    const nextBtn = document.getElementById('nextQuestionBtn');
    const resultArea = document.getElementById('resultArea');
    const quizContainer = document.getElementById('quizContainer');
    const resultName = document.getElementById('resultName');
    const resultMessage = document.getElementById('resultMessage');
    const restartTopicBtn = document.getElementById('restartTopicBtn');
    const resetProgressBtn = document.getElementById('resetProgressBtn');

    // ---------- HELPERS ----------
    function getTopicData(index) { return allTopics[index] || allTopics[0]; }

    function getProgressKey() {
      return `${currentTopicIndex}-${currentMode}`;
    }

    function loadProgress() {
      const stored = localStorage.getItem('pkFlashProgress');
      if (stored) {
        try { progress = JSON.parse(stored); } catch(e) { progress = {}; }
      } else {
