<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCL 423 — Kinetics &amp; Clinical Pharmacokinetics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F2A;
    --navy-2:#102838;
    --paper:#F5F2EA;
    --paper-dim:#E8E3D6;
    --teal:#2FA5A9;
    --teal-dim:#1F7478;
    --coral:#E4572E;
    --green:#4C9A6A;
    --slate:#7C8B94;
    --ink:#0B1F2A;
    --gold:#D9A441;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--navy);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{background:var(--teal); color:var(--navy);}
  h1,h2,h3,.serif{font-family:'Spectral',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:'Inter',sans-serif; cursor:pointer; border:none;}
  button:focus-visible, input:focus-visible, a:focus-visible{outline:2px solid var(--teal); outline-offset:3px;}
  a{color:inherit;}

  /* ---------- background curve ---------- */
  .bg-curve{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.35;
  }
  .bg-grid{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(245,242,234,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,242,234,0.025) 1px, transparent 1px);
    background-size:48px 48px;
  }

  .app{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 20px 64px;}
  .wrap{width:100%; max-width:760px;}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    width:100%; max-width:760px; margin-bottom:28px;
  }
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand-mark{
    font-family:'Spectral',serif; font-weight:600; font-size:1.35rem; letter-spacing:-0.01em;
  }
  .brand-mark span{color:var(--gold);}
  .brand-sub{font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--slate);}
  .user-chip{
    display:flex; align-items:center; gap:8px;
    font-size:0.8rem; color:var(--slate);
    background:rgba(245,242,234,0.05); border:1px solid rgba(245,242,234,0.1);
    padding:6px 12px; border-radius:100px;
  }
  .user-chip strong{color:var(--paper); font-weight:600;}

  /* ---------- name gate ---------- */
  .gate{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    min-height:82vh; justify-content:center; width:100%; max-width:560px; margin:0 auto;
  }
  .gate-eyebrow{
    font-size:0.72rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--teal);
    margin-bottom:18px;
  }
  .gate h1{
    font-size:2.6rem; font-weight:600; line-height:1.08; letter-spacing:-0.015em;
    margin-bottom:14px;
  }
  .gate h1 em{font-style:italic; color:var(--gold);}
  .gate p.lead{
    color:var(--slate); font-size:1rem; line-height:1.6; max-width:440px; margin-bottom:36px;
  }
  .name-form{width:100%; max-width:380px; display:flex; flex-direction:column; gap:14px;}
  .name-form input{
    width:100%; padding:16px 18px; border-radius:10px;
    background:rgba(245,242,234,0.06); border:1px solid rgba(245,242,234,0.18);
    color:var(--paper); font-size:1.05rem; font-family:'Spectral',serif;
    transition:border-color .2s, background .2s;
  }
  .name-form input::placeholder{color:rgba(245,242,234,0.35); font-family:'Inter',sans-serif;}
  .name-form input:focus{border-color:var(--teal); background:rgba(245,242,234,0.09);}
  .btn{
    padding:15px 24px; border-radius:10px; font-weight:600; font-size:0.95rem;
    transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn-primary{background:var(--teal); color:var(--navy);}
  .btn-primary:hover{box-shadow:0 8px 24px -8px rgba(47,165,169,0.6);}
  .btn-primary:disabled{opacity:0.35; transform:none; box-shadow:none; cursor:not-allowed;}
  .btn-gold{background:var(--gold); color:var(--navy);}
  .btn-gold:hover{box-shadow:0 8px 24px -8px rgba(217,164,65,0.6);}
  .btn-ghost{background:transparent; color:var(--paper); border:1px solid rgba(245,242,234,0.25);}
  .btn-ghost:hover{background:rgba(245,242,234,0.06);}
  .btn-danger-ghost{background:transparent; color:var(--coral); border:1px solid rgba(228,87,46,0.35);}
  .btn-sm{padding:9px 16px; font-size:0.82rem; border-radius:8px;}

  .gate-hint{font-size:0.75rem; color:var(--slate); margin-top:14px;}

  /* ---------- home / topic grid ---------- */
  .home-head{margin-bottom:30px;}
  .home-head .eyebrow{font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--teal); margin-bottom:10px;}
  .home-head h1{font-size:1.9rem; font-weight:600; letter-spacing:-0.01em; margin-bottom:8px;}
  .home-head p{color:var(--slate); font-size:0.95rem; line-height:1.55; max-width:560px;}

  .overall-bar{
    width:100%; height:6px; border-radius:100px; background:rgba(245,242,234,0.08);
    margin:22px 0 4px; overflow:hidden;
  }
  .overall-bar-fill{height:100%; background:linear-gradient(90deg, var(--teal), var(--gold)); border-radius:100px; transition:width .5s ease;}
  .overall-label{font-size:0.72rem; color:var(--slate); margin-bottom:26px; letter-spacing:0.02em;}

  .topic-list{display:flex; flex-direction:column; gap:14px;}
  .topic-card{
    background:var(--paper); color:var(--ink); border-radius:14px; padding:22px 24px;
    position:relative; overflow:hidden;
  }
  .topic-card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--tcolor, var(--teal));
  }
  .topic-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:14px;}
  .topic-num{
    font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--slate); letter-spacing:0.05em;
  }
  .topic-title{font-family:'Spectral',serif; font-weight:600; font-size:1.22rem; letter-spacing:-0.01em; margin-top:2px;}
  .topic-desc{font-size:0.83rem; color:#5b6670; line-height:1.5; margin-top:6px; max-width:480px;}

  .mode-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
  .mode-btn{
    flex:1; min-width:150px; text-align:left; padding:12px 14px; border-radius:10px;
    background:rgba(11,31,42,0.04); border:1px solid rgba(11,31,42,0.1);
    display:flex; flex-direction:column; gap:4px; transition:background .15s, border-color .15s;
  }
  .mode-btn:hover{background:rgba(11,31,42,0.08); border-color:rgba(11,31,42,0.2);}
  .mode-btn .mlabel{font-size:0.78rem; font-weight:600; display:flex; justify-content:space-between; align-items:center;}
  .mode-btn .mprog{font-size:0.68rem; color:#5b6670; font-family:'JetBrains Mono',monospace;}
  .mode-badge{
    font-size:0.62rem; padding:2px 7px; border-radius:100px; font-weight:700; letter-spacing:0.03em;
  }
  .badge-done{background:var(--green); color:#fff;}
  .badge-progress{background:var(--gold); color:var(--navy);}
  .badge-new{background:rgba(11,31,42,0.08); color:#5b6670;}

  /* ---------- quiz shell ---------- */
  .quiz-topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; width:100%;}
  .quiz-meta{font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--teal);}
  .quiz-progress-track{
    width:100%; height:5px; background:rgba(245,242,234,0.08); border-radius:100px; margin-bottom:30px; overflow:hidden;
  }
  .quiz-progress-fill{height:100%; background:var(--teal); border-radius:100px; transition:width .4s ease;}

  .qcard{
    background:var(--paper); color:var(--ink); border-radius:18px; padding:36px 32px;
    min-height:280px; display:flex; flex-direction:column;
  }
  .qkicker{font-size:0.7rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--teal-dim); font-weight:600; margin-bottom:14px;}
  .qtext{font-family:'Spectral',serif; font-size:1.35rem; line-height:1.45; font-weight:500; flex:1;}

  .sa-input-row{display:flex; gap:10px; margin-top:26px;}
  .sa-input-row input{
    flex:1; padding:14px 16px; border-radius:10px; border:1.5px solid #cfc8b5;
    font-family:'Inter',sans-serif; font-size:0.98rem; background:#fff;
  }
  .sa-input-row input:focus{border-color:var(--teal);}
  .sa-check{background:var(--navy); color:var(--paper); padding:0 22px; border-radius:10px; font-weight:600; font-size:0.9rem;}
  .sa-check:disabled{opacity:0.3;}

  .feedback{
    margin-top:20px; padding:16px 18px; border-radius:10px; font-size:0.9rem; line-height:1.55;
    display:flex; gap:10px; align-items:flex-start;
  }
  .feedback.correct{background:rgba(76,154,106,0.12); border:1px solid rgba(76,154,106,0.35);}
  .feedback.wrong{background:rgba(228,87,46,0.1); border:1px solid rgba(228,87,46,0.3);}
  .feedback b{display:block; margin-bottom:2px;}

  .mcq-opts{display:flex; flex-direction:column; gap:10px; margin-top:26px;}
  .opt{
    text-align:left; padding:13px 16px; border-radius:10px; border:1.5px solid #d8d2c1;
    background:#fff; font-size:0.94rem; display:flex; align-items:center; justify-content:space-between; gap:10px;
    transition:border-color .15s, background .15s;
  }
  .opt:hover:not(:disabled){border-color:var(--teal);}
  .opt:disabled{cursor:default;}
  .opt.chosen{border-color:var(--navy);}
  .opt.opt-correct{border-color:var(--green); background:rgba(76,154,106,0.1);}
  .opt.opt-wrong{border-color:var(--coral); background:rgba(228,87,46,0.08);}
  .opt-letter{
    font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--slate);
    width:20px; height:20px; border-radius:50%; border:1px solid #c9c2ae;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }

  .quiz-nav{display:flex; justify-content:space-between; align-items:center; margin-top:22px;}

  /* ---------- results ---------- */
  .results-card{background:var(--paper); color:var(--ink); border-radius:18px; padding:44px 32px; text-align:center;}
  .score-ring{font-family:'Spectral',serif; font-size:4rem; font-weight:600; letter-spacing:-0.02em;}
  .results-sub{color:#5b6670; font-size:0.92rem; margin:6px 0 28px;}
  .results-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}

  /* ---------- footer nav ---------- */
  .back-row{margin-bottom:18px;}

  @media (max-width:600px){
    .gate h1{font-size:2.05rem;}
    .qcard{padding:26px 20px;}
    .topic-card{padding:18px;}
    .mode-row{flex-direction:column;}
  }
</style>
</head>
<body>

<svg class="bg-curve" viewBox="0 0 1440 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path id="decayPath" d="M -50 120 C 250 140, 380 500, 750 620 S 1250 780, 1550 800" stroke="#2FA5A9" stroke-width="1.5" fill="none" stroke-dasharray="6 8"/>
  <path d="M -50 60 C 300 90, 500 300, 760 420 S 1200 560, 1550 610" stroke="#D9A441" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="2 6"/>
</svg>
<div class="bg-grid"></div>

<div class="app" id="app"></div>

<script>
/* ============================================================
   DATA — PCL 423: Rates & Orders of Reaction / Clinical PK
   ============================================================ */
const SECTIONS = [
  {
    id:'kinetics',
    color:'#2FA5A9',
    num:'01',
    title:'Rates & Orders of Reaction',
    desc:'Zero, first & second order kinetics, rate constants, half-life, and complex reaction schemes.',
    short:[
      {q:"What is pharmacokinetics, in one sentence?", accept:["rate","absorption","distribution","metabolism","excretion"], a:"The mathematical study of the rate at which drug reactions (ADME) occur in the body."},
      {q:"Define 'order of reaction'.", accept:["number of concentration","concentration terms","determine the rate","influences the rate"], a:"The number of concentration terms that determine the rate of a reaction (or how concentration influences the rate)."},
      {q:"What does the rate constant K depend on, and what is it independent of?", accept:["temperature","independent of concentration"], a:"K is independent of concentration, but depends on factors like temperature."},
      {q:"Write the integrated equation for a zero order reaction.", accept:["kt","c0","ct = c0"], a:"Ct = C0 − Kt (a plot of concentration vs time is a straight line, slope = −K)."},
      {q:"What is the unit of K for a zero order reaction?", accept:["conc", "mol l-1 s-1","concentration time"], a:"Concentration·time⁻¹, e.g. mol L⁻¹ s⁻¹."},
      {q:"Give the half-life equation for a zero order reaction.", accept:["c0/2k","co/2k"], a:"t1/2 = C0 / 2K."},
      {q:"Name one pharmaceutical example of a zero order process.", accept:["infusion","transdermal","tdds","suspension","vitamin a","cefotaxime"], a:"Drug release from IV infusion or a transdermal delivery system (TDDS); also solubility-limited degradation in suspensions."},
      {q:"Give the half-life equation for a first order reaction.", accept:["0.693"], a:"t1/2 = 0.693 / K."},
      {q:"Name one pharmacokinetic process that follows first order kinetics.", accept:["absorption","distribution","elimination","microbial"], a:"Drug absorption, distribution, and elimination generally follow first order kinetics."},
      {q:"What is the unit of K for a second order reaction?", accept:["mol-1","conc-1 time-1","concentration"], a:"Concentration⁻¹·time⁻¹, e.g. mol⁻¹ s⁻¹."},
      {q:"What is a pseudo-first order reaction? Give an example.", accept:["excess","constant concentration","aspirin","ascorbic"], a:"A second order reaction that behaves like first order because one reactant is present in great excess (e.g. aspirin hydrolysis, ascorbic acid tablet decomposition)."},
      {q:"On the data-plotting method, which plot is linear for a first order reaction?", accept:["log", "ln c"], a:"A plot of log (a−x), or ln C, against time is linear for a first order reaction."},
      {q:"List the methods used to determine the order of a reaction.", accept:["substitution","plotting","initial rate","half-life"], a:"Substitution method, data plotting method, initial rate method, and half-life determination method."},
      {q:"According to the half-life determination method, how does t1/2 relate to initial concentration 'a' and reaction order n?", accept:["1/a","n-1"], a:"t1/2 is proportional to 1/a^(n−1)."},
      {q:"What is t10%, and how does it relate to t1/2 for a first order reaction?", accept:["0.104","0.152"], a:"t10% = 0.104/K, which equals approximately 0.152 × t1/2."},
    ],
    mcq:[
      {q:"A reaction whose rate is independent of the concentration of reactant is:", opts:["Zero order","First order","Second order","Pseudo-first order"], correct:0},
      {q:"The half-life of a first order reaction is:", opts:["Dependent on initial concentration","Independent of initial concentration","Always 0.693 seconds","Proportional to concentration squared"], correct:1},
      {q:"The SI unit of K for a first order reaction is:", opts:["mol L⁻¹ s⁻¹","s⁻¹","mol⁻¹ s⁻¹","L mol⁻¹"], correct:1},
      {q:"Degradation of a drug reservoir in a suspension (with excess solid drug) follows:", opts:["First order kinetics","Second order kinetics","Pseudo-zero order kinetics","Third order kinetics"], correct:2},
      {q:"For a first order reaction, plotting log(a−x) vs time gives a straight line whose slope is:", opts:["+K", "−K/2.303","+K/2.303","−K"], correct:1},
      {q:"Which of these is NOT a recognised method for determining reaction order?", opts:["Substitution method","Data plotting method","Initial rate method","Titration endpoint method"], correct:3},
      {q:"Epimerization of tetracycline (A ⇌ B) is a classic example of a/an:", opts:["Consecutive reaction","Opposing (reversible) reaction","Parallel reaction","Zero order reaction"], correct:1},
      {q:"Degradation of chlorbenzodiazepine to a lactam and then to benzophenone (A→B→C) is an example of a/an:", opts:["Opposing reaction","Parallel reaction","Consecutive reaction","Pseudo-first order reaction"], correct:2},
      {q:"Purified insulin degrading simultaneously by deamidation and polymerization is an example of a/an:", opts:["Consecutive reaction","Parallel reaction","Opposing reaction","Zero order reaction"], correct:1},
      {q:"For a second order reaction where a=b, plotting 1/(a−x) vs time gives a straight line with slope equal to:", opts:["K","−K","2K","K/2.303"], correct:0},
      {q:"In the initial rate method, a straight-line graph of rate vs concentration indicates:", opts:["Zero order","First order","Second order","Third order"], correct:1},
      {q:"Photolysis of cefotaxime is a pharmaceutical example of a:", opts:["Zero order reaction","First order reaction","Second order reaction","Consecutive reaction"], correct:0},
    ]
  },
  {
    id:'models',
    color:'#D9A441',
    num:'02',
    title:'Pharmacokinetic Compartment Models',
    desc:'One, two and three-compartment open models, apparent volume of distribution, and the biphasic/triphasic curves.',
    short:[
      {q:"What is a pharmacokinetic model?", accept:["mathematical","quantitative","time course"], a:"A mathematical description of a biological system, expressing quantitative relationships for the time course of a drug in the body."},
      {q:"List the three types of pharmacokinetic models.", accept:["compartment","non-compartment","physiological"], a:"Compartment model, non-compartment model, and physiological model."},
      {q:"Define a 'compartment' in pharmacokinetics.", accept:["tissues","blood flow","drug affinity","not a real"], a:"A group of tissues with similar blood flow and drug affinity; it is not a real physiological or anatomic region."},
      {q:"Write the equation relating amount of drug (A), plasma concentration (Cp) and volume of distribution (Vd).", accept:["a = cp","cp x vd","cp*vd"], a:"A = Cp × Vd."},
      {q:"State one key assumption of the one-compartment open model.", accept:["instant","homogenous","equilibrium"], a:"Instant and homogeneous distribution; the drug rapidly equilibrates between blood and other tissues."},
      {q:"What two phases appear on the concentration-time curve of a two-compartment model?", accept:["distribution","elimination","biphasic"], a:"An initial rapid distribution phase followed by a slower elimination phase (a biphasic curve)."},
      {q:"Write the biexponential equation for plasma concentration in a two-compartment model.", accept:["ae","be","α","β"], a:"Cp = A e^(−αt) + B e^(−βt)."},
      {q:"In the two-compartment model, what do alpha (α) and beta (β) represent?", accept:["distribution","elimination"], a:"α is the rate constant for the distribution phase; β is the rate constant for the elimination phase."},
      {q:"Give the equation for Vdss in terms of Vp, K12 and K21.", accept:["vp(1", "k12/k21"], a:"Vdss = Vp (1 + K12/K21)."},
      {q:"Which volume of distribution is described as 'the true distribution change in the body, unaffected by elimination'?", accept:["vdss"], a:"Vdss (apparent volume of distribution at steady state)."},
      {q:"What is the 'flip-flop' model?", accept:["elimination", "absorption"], a:"When the elimination rate constant is much greater than the absorption rate constant during extravascular dosing."},
      {q:"How many exponential terms are needed to describe the concentration-time curve of a three-compartment model?", accept:["three","triexponential","3"], a:"Three (a triexponential equation: Cp = Ae^(−αt) + Be^(−βt) + Ce^(−γt))."},
      {q:"Name two organs/tissues typically found in the central compartment.", accept:["blood","heart","brain","liver","kidney","extracellular"], a:"Blood, heart, brain, kidney, liver, extracellular fluid (highly perfused tissues)."},
    ],
    mcq:[
      {q:"The apparent volume of distribution (Vd) is best described as:", opts:["A true anatomical volume","A hypothetical volume, not a real physiological space","Always equal to plasma volume","Always equal to total body water"], correct:1},
      {q:"In the two-compartment open model, drug enters and leaves the body only through the:", opts:["Tissue compartment","Central compartment","Deep tissue compartment","Peripheral compartment"], correct:1},
      {q:"Which compartment equilibrates with the drug more slowly?", opts:["Central compartment","Tissue/peripheral compartment","Both equally","Neither, equilibration is instant"], correct:1},
      {q:"In the classic two-tank experiment, the tank containing charcoal (drug absorbent) shows an apparent Vd of:", opts:["50 L","75 L","100 L","25 L"], correct:2},
      {q:"The concentration-time profile of a three-compartment model is described as:", opts:["Monophasic","Biphasic","Triphasic","Linear"], correct:2},
      {q:"Insulin given intravenously is best described by a:", opts:["One-compartment model","Two-compartment model","Three-compartment model","Zero-compartment model"], correct:2},
      {q:"In the two-compartment model, the relationship between alpha and beta is typically:", opts:["α ≈ β","α >>> β","β >>> α","α = 0"], correct:1},
      {q:"Vdβ (apparent Vd by area) is calculated as:", opts:["KVp/β","Vp + Vt","D/AUC","Cp × Vd"], correct:0},
      {q:"Drugs like lidocaine, whose target organ is in the central compartment, risk toxicity because:", opts:["Cp is initially lower than expected","Cp is initially much higher than expected after IV bolus","Vd is always very large","They follow zero order kinetics"], correct:1},
      {q:"Which of the following is NOT one of the three types of pharmacokinetic models?", opts:["Compartment model","Non-compartment model","Physiological model","Enzymatic model"], correct:3},
    ]
  },
  {
    id:'dosing',
    color:'#4C9A6A',
    num:'03',
    title:'Dose Administration & Non-Compartmental Analysis',
    desc:'IV bolus, continuous infusion, extravascular dosing, loading doses, multiple dosing, and AUC-based parameters.',
    short:[
      {q:"What assumption does IV bolus dosing make about the rate of absorption?", accept:["negligible","instantaneous"], a:"The entire dose enters the body instantaneously, so absorption rate is assumed negligible."},
      {q:"Write the log-linear equation for plasma concentration decline after an IV bolus (one-compartment model).", accept:["log c0","ket"], a:"Log C = Log C0 − Ket/2.303."},
      {q:"What is Css in the context of a continuous IV infusion?", accept:["steady state","plateau"], a:"The steady-state (plateau) plasma concentration reached during constant-rate infusion."},
      {q:"Give the formula for Css during IV infusion.", accept:["r0","kevd"], a:"Css = R0 / (Ke·Vd)."},
      {q:"Why is a loading dose given?", accept:["rapidly","quickly", "steady state"], a:"To achieve the steady-state concentration rapidly, rather than waiting several half-lives for it to accumulate."},
      {q:"Give a formula for calculating a loading dose (DL).", accept:["css","vd","r0/ke"], a:"DL = Css × Vd, or equivalently DL = R0/Ke."},
      {q:"What two kinetic processes characterize typical extravascular (e.g. oral) dosing?", accept:["first order absorption","first order elimination"], a:"First-order absorption AND first-order elimination."},
      {q:"In normal (non flip-flop) extravascular dosing, how does the absorption rate constant (Ka) compare to elimination rate constant (K)?", accept:["ka >>","greater"], a:"Ka is much greater than K (Ka >> K)."},
      {q:"What is the 'residual' (feathering/peeling) method used for?", accept:["ka","absorption rate constant"], a:"To determine the absorption rate constant (Ka) from the absorption phase of an oral concentration-time plot, by subtracting the extrapolated elimination line."},
      {q:"After how many half-lives of dosing at the half-life interval does concentration typically reach steady state with multiple dosing?", accept:["7","8"], a:"After about 7–8 doses/half-lives."},

    mcq:[
      {q:"IV infusion combined with first-order elimination is a classic example of:", opts:["Zero order absorption, first order elimination","First order absorption, zero order elimination","Zero order elimination only","First order absorption and elimination"], correct:0},

      {q:"Mean Residence Time (MRT) is calculated as:", opts:["AUC/AUMC","AUMC/AUC","Dose/AUC","Cmax/AUC"], correct:1},

      {q:"What are the two main PK changes seen in congestive heart failure?", accept:["volume of distribution","clearance"], a:"A reduction in the volume of distribution and impairment of clearance."},
    ],
    mcq:[
      {q:"Non-linear pharmacokinetics may arise from saturation of:", opts:["Renal blood flow only","An enzyme- or carrier-mediated transport system","Gastric pH regulation","Cardiac output"], correct:1},
      {q:"Griseofulvin shows non-linear absorption mainly because it is:", opts:["Highly water soluble","Solubility/dissolution-rate limited","Actively secreted in urine","Metabolized by CYP2D6 only"], correct:1},
      {q:"Carbamazepine's decreasing plasma concentration with repeated dosing is due to:", opts:["Enzyme inhibition","Enzyme induction (autoinduction)","Renal failure","Increased protein binding"], correct:1},
      {q:"The main pharmacokinetic changes seen in heart failure are:", opts:["Increased Vd and increased clearance","Reduced Vd and impaired clearance","No change in either parameter","Increased bioavailability only"], correct:1},
      {q:"Uremia's primary effect on GI drug absorption is to:", opts:["Increase absorption","Decrease absorption","Have no effect","Only affect IV drugs"], correct:1},
      {q:"Reduced hepatic blood flow chiefly affects the clearance of drugs that are:", opts:["Renally eliminated only","Unrestrictively (flow-limited) metabolized","Not metabolized at all","Excreted unchanged in bile only"], correct:1},
      {q:"As drug dose/concentration increases, the increase in pharmacological effect typically follows:", opts:["A constant linear increase forever","The law of diminishing returns, reaching a maximum","An exponential increase without limit","No predictable pattern"], correct:1},
      {q:"Chronic liver disease commonly causes which change in serum proteins?", opts:["Hyperalbuminemia","Hypoalbuminemia","No change in albumin","Increased globulin only, no change in albumin"], correct:1},

  {
    id:'pgx-ba',
    color:'#8E6FBF',
    num:'05',
    title:'Pharmacogenetics & Bioavailability/Bioequivalence',
    desc:'Genetic variation in drug response, metabolizer phenotypes, and how bioavailability & bioequivalence are defined and tested.',
    short:[
      {q:"Define pharmacogenetics.", accept:["hereditary","genetic","response to drugs"], a:"The study of the influence of hereditary/genetic factors on an individual's response to drugs."},
      {q:"How does pharmacogenetics differ from pharmacogenomics?", accept:["single gene","multiple genes","population"], a:"Pharmacogenetics focuses on a single gene's effect on drug response; pharmacogenomics considers multiple genes, often at a population level."},
      {q:"Name the four metabolizer phenotypes.", accept:["poor","intermediate","extensive","ultrarapid"], a:"Poor, Intermediate, Extensive, and Ultrarapid metabolizers."},
      {q:"What clinical risk exists for an infant breastfed by an ultrarapid CYP2D6 metabolizer mother taking codeine?", accept:["morphine","respiratory depression","toxicity"], a:"Excessive conversion of codeine to morphine in the mother, causing potentially fatal respiratory depression in the breastfed infant."},
      {q:"Which CYP450 enzyme's polymorphism affects warfarin dosing requirements?", accept:["cyp2c9"], a:"CYP2C9 (variants reduce metabolism of S-warfarin, requiring lower maintenance doses)."},
      {q:"Define bioavailability.", accept:["rate","extent","systemic circulation"], a:"The rate and extent to which the active drug is absorbed from a dosage form and becomes available at the site of action."},
      {q:"Write the formula for absolute bioavailability.", accept:["aucpo","auciv"], a:"F = (AUCpo/Dpo) / (AUCiv/Div)."},
      {q:"What is the key difference between absolute and relative bioavailability?", accept:["iv","two non-iv","reference"], a:"Absolute bioavailability compares a dosage form to an IV dose (F=100%); relative bioavailability compares two non-IV formulations to each other."},

      {q:"Which BCS class(es) of drugs may qualify for a biowaiver (in vitro bioequivalence only)?", accept:["class i","class 1","class iii","class 3"], a:"BCS Class I (high solubility, high permeability), and in some cases Class III."},
      {q:"What does Tmax primarily indicate about a drug?", accept:["rate of absorption"], a:"The rate of absorption — the time at which peak plasma concentration is reached."},
      {q:"What does Cmax need to stay between, for a drug to be both safe and effective?", accept:["minimum effective","minimum toxic"], a:"The minimum effective concentration (MEC) and the minimum toxic concentration (MTC)."},
    ],
    mcq:[
      {q:"Genetic polymorphism is defined as a DNA sequence variation found in at least:", opts:["0.1% of the population","1% of the population","10% of the population","50% of the population"], correct:1},
      {q:"The term 'pharmacogenetics' was first coined by:", opts:["Kalow (1962)","Vogel (1959)","Pythagoras (510 BCE)","FDA (2010)"], correct:1},
      {q:"Slow acetylation causing peripheral neuropathy is classically linked to treatment with:", opts:["Warfarin","Isoniazid","Codeine","Clopidogrel"], correct:1},
      {q:"CYP450 enzymes are estimated to mediate what percentage of phase I drug metabolism?", opts:["About 20%","About 40%","About 78–80%","Nearly 100%"], correct:2},
      {q:"An IV bolus dose, by definition, has an absolute bioavailability of:", opts:["50%","75%","90%","100%"], correct:3},
      {q:"Cmax and Tmax are parameters that primarily reflect the:", opts:["Extent of absorption only","Rate of absorption","Route of elimination","Protein binding"], correct:1},
      {q:"AUC (area under the curve) is the primary measure of the:", opts:["Rate of absorption","Extent of absorption","Onset of action only","Duration of infusion"], correct:1},
      {q:"Two products are 'bioequivalent' when there is no significant difference in:", opts:["Tablet color and shape","Rate and extent of absorption under similar conditions","Price and packaging","Manufacturer identity"], correct:1},
      {q:"A BCS Class II drug is characterized by:", opts:["High solubility, high permeability","Low solubility, high permeability","High solubility, low permeability","Low solubility, low permeability"], correct:1},
      {q:"Poor metabolizers who are given a prodrug typically experience:", opts:["Faster conversion to active drug","Slower conversion to active drug, reduced effect","No effect on prodrug conversion","Immediate toxicity in all cases"], correct:1},
    ]
  }
];

/* ============================================================
   STATE + PERSISTENCE
   ============================================================ */
const STORAGE_KEY = "pcl423_state_v1";

let storageAvailable = true;
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ storageAvailable = false; }
  return { name:null, progress:{} };
}
function saveState(){
  if(!storageAvailable) return;
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    storageAvailable = false;
  }
}

let state = loadState();
let route = state.name ? {screen:'home'} : {screen:'gate'};
let activeQuiz = null; // {sectionId, mode, idx, answers:[], score}

function ensureProgress(sectionId){
  if(!state.progress[sectionId]) state.progress[sectionId] = {};
  const p = state.progress[sectionId];
  if(!p.short) p.short = {status:'new', idx:0, score:0, done:0};
  if(!p.mcq) p.mcq = {status:'new', idx:0, score:0, done:0};
  return p;
}

/* ============================================================
   RENDER ENGINE
   ============================================================ */
const app = document.getElementById('app');

function render(){
  try{
    app.innerHTML = '';
    if(route.screen === 'gate') return renderGate();
    renderTopbar();
    if(route.screen === 'home') return renderHome();
    if(route.screen === 'quiz') return renderQuiz();
    if(route.screen === 'results') return renderResults();
  }catch(err){
    app.innerHTML = `<div class="wrap" style="padding-top:60px;text-align:center;">
      <p style="color:var(--slate);font-size:0.85rem;">Something went wrong loading this screen.</p>
      <button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="route={screen:'home'};render();">Go to topics</button>
    </div>`;
    console.error(err);
  }
}

function renderTopbar(){
  const bar = document.createElement('div');
  bar.className = 'topbar wrap';
  bar.innerHTML = `
    <div class="brand">
      <span class="brand-mark">PCL423<span>.</span></span>
    </div>
    <div class="user-chip">◆&nbsp; <strong>${escapeHtml(state.name)}</strong></div>
  `;
  app.appendChild(bar);
}

/* ---------- GATE (name entry) ---------- */
function renderGate(){
  const el = document.createElement('div');
  el.className = 'gate';
  el.innerHTML = `
    <div class="gate-eyebrow">Clinical Pharmacokinetics · PCL 423</div>
    <h1>Be <em>completely</em><br/>ready for it.</h1>
    <p class="lead">Rates &amp; orders of reaction, compartment models, dosing, non-linear kinetics, pharmacogenetics and bioequivalence — in one focused revision deck.</p>
    <form class="name-form" id="nameForm" autocomplete="off">
      <input type="text" id="nameInput" placeholder="Enter your name to begin" required maxlength="40"/>
      <button type="submit" class="btn btn-primary">Start studying →</button>
    </form>
    <p class="gate-hint">Your progress saves automatically on this device — close the tab any time.</p>
  `;
  app.appendChild(el);
  const form = document.getElementById('nameForm');
  form.addEventListener('submit', (e)=>{
    e.preventDefault();
    const val = document.getElementById('nameInput').value.trim();
    if(!val) return;
    state.name = val;
    saveState();
    route = {screen:'home'};
    render();
  });
  document.getElementById('nameInput').focus();
}

/* ---------- HOME ---------- */
function renderHome(){
  const wrap = document.createElement('div');
  wrap.className = 'wrap';

  let totalDone=0, totalItems=0;
  SECTIONS.forEach(s=>{
    const p = ensureProgress(s.id);
    totalItems += s.short.length + s.mcq.length;
    totalDone += p.short.done + p.mcq.done;
  });
  const pct = totalItems ? Math.round((totalDone/totalItems)*100) : 0;

  wrap.innerHTML = `
    <div class="home-head">
      <div class="eyebrow">Welcome back, ${escapeHtml(state.name.split(' ')[0])}</div>
      <h1>Choose a topic to study</h1>
      <p>Every topic has a Short Answer mode and an MCQ mode. Work through both to be fully prepared.</p>
      <div class="overall-bar"><div class="overall-bar-fill" style="width:${pct}%"></div></div>
      <div class="overall-label">${pct}% of all questions completed · ${totalDone}/${totalItems}</div>
    </div>
    <div class="topic-list" id="topicList"></div>
  `;
  app.appendChild(wrap);

  const list = document.getElementById('topicList');
  SECTIONS.forEach(s=>{
    const p = ensureProgress(s.id);
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.style.setProperty('--tcolor', s.color);
    card.innerHTML = `
      <div class="topic-top">
        <div>
          <div class="topic-num">SECTION ${s.num}</div>
          <div class="topic-title">${s.title}</div>
          <div class="topic-desc">${s.desc}</div>
        </div>
      </div>
      <div class="mode-row">
        ${modeButtonHtml(s,'short','Short Answer', p.short)}
        ${modeButtonHtml(s,'mcq','Multiple Choice', p.mcq)}
      </div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const sectionId = btn.dataset.section;
      const mode = btn.dataset.mode;
      startOrResume(sectionId, mode);
    });
  });
}

function modeButtonHtml(section, mode, label, p){
  const total = section[mode].length;
  let badge = `<span class="mode-badge badge-new">Start</span>`;
  if(p.status === 'done') badge = `<span class="mode-badge badge-done">Done ${p.score}/${total}</span>`;
  else if(p.done > 0) badge = `<span class="mode-badge badge-progress">Resume</span>`;
  return `
    <button class="mode-btn" data-section="${section.id}" data-mode="${mode}">
      <span class="mlabel">${label} ${badge}</span>
      <span class="mprog">${p.done}/${total} answered</span>
    </button>
  `;
}

function startOrResume(sectionId, mode){
  const p = ensureProgress(sectionId);
  const m = p[mode];
  if(m.status === 'done'){
    // restart fresh
    m.status='new'; m.idx=0; m.score=0; m.done=0; m.answers=[];
    saveState();
  }
  activeQuiz = {sectionId, mode, idx:m.idx||0, score:m.score||0};
  route = {screen:'quiz'};
  render();
}

/* ---------- QUIZ ---------- */
let quizLocal = { revealed:false, chosen:null, inputVal:'' };

function renderQuiz(){
  const section = SECTIONS.find(s=>s.id===activeQuiz.sectionId);
  const items = section[activeQuiz.mode];
  const idx = activeQuiz.idx;
  const item = items[idx];
  quizLocal = { revealed:false, chosen:null, inputVal:'' };

  const wrap = document.createElement('div');
  wrap.className = 'wrap';

  wrap.innerHTML = `
    <div class="back-row"><button class="btn btn-ghost btn-sm" id="backHome">← All topics</button></div>
    <div class="quiz-topbar">
      <div class="quiz-meta">${section.title} · ${activeQuiz.mode === 'short' ? 'Short Answer' : 'Multiple Choice'}</div>
      <div class="quiz-meta">${idx+1} / ${items.length}</div>
    </div>
    <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${((idx)/items.length)*100}%"></div></div>
    <div class="qcard" id="qcard"></div>
    <div class="quiz-nav" id="quizNav"></div>
  `;
  app.appendChild(wrap);
  document.getElementById('backHome').addEventListener('click', ()=>{ route={screen:'home'}; render(); });

  renderQuestionCard(section, item);
}

function renderQuestionCard(section, item){
  const qcard = document.getElementById('qcard');
  if(activeQuiz.mode === 'short'){
    qcard.innerHTML = `
      <div class="qkicker">Short Answer</div>
      <div class="qtext">${escapeHtml(item.q)}</div>
      <div class="sa-input-row">
        <input type="text" id="saInput" placeholder="Type your answer…" autocomplete="off"/>
        <button class="btn sa-check" id="saCheck">Check</button>
      </div>
      <div id="saFeedback"></div>
    `;
    const input = document.getElementById('saInput');
    const checkBtn = document.getElementById('saCheck');
    input.focus();
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') doSaCheck(item); });
    checkBtn.addEventListener('click', ()=> doSaCheck(item));
    renderQuizNav(section, false);
  } else {
    const letters = ['A','B','C','D','E'];
    qcard.innerHTML = `
      <div class="qkicker">Multiple Choice</div>
      <div class="qtext">${escapeHtml(item.q)}</div>
      <div class="mcq-opts" id="mcqOpts">
        ${item.opts.map((o,i)=>`
          <button class="opt" data-i="${i}">
            <span style="display:flex;align-items:center;gap:12px;"><span class="opt-letter">${letters[i]}</span>${escapeHtml(o)}</span>
          </button>`).join('')}
      </div>
      <div id="mcqFeedback"></div>
    `;
    document.querySelectorAll('#mcqOpts .opt').forEach(btn=>{
      btn.addEventListener('click', ()=> doMcqChoose(item, parseInt(btn.dataset.i)));
    });
    renderQuizNav(section, false);
  }
}

function doSaCheck(item){
  if(quizLocal.revealed) return;
  const val = document.getElementById('saInput').value.trim();
  const norm = val.toLowerCase();
  const correct = item.accept.some(k => norm.includes(k.toLowerCase())) && val.length>0;
  quizLocal.revealed = true;
  recordAnswer(correct);
  const fb = document.getElementById('saFeedback');
  fb.innerHTML = `
    <div class="feedback ${correct?'correct':'wrong'}">
      <span>${correct ? '✓' : '✕'}</span>
      <div><b>${correct ? 'Good — that is right.' : 'Not quite.'}</b>${escapeHtml(item.a)}</div>
    </div>`;
  document.getElementById('saInput').disabled = true;
  document.getElementById('saCheck').disabled = true;
  renderQuizNav(SECTIONS.find(s=>s.id===activeQuiz.sectionId), true);
}

function doMcqChoose(item, i){
  if(quizLocal.revealed) return;
  quizLocal.revealed = true;
  quizLocal.chosen = i;
  const correct = i === item.correct;
  recordAnswer(correct);
  document.querySelectorAll('#mcqOpts .opt').forEach((btn,bi)=>{
    btn.disabled = true;
    if(bi === item.correct) btn.classList.add('opt-correct');
    if(bi === i && i !== item.correct) btn.classList.add('opt-wrong');
    if(bi === i) btn.classList.add('chosen');
  });
  const fb = document.getElementById('mcqFeedback');
  fb.innerHTML = `
    <div class="feedback ${correct?'correct':'wrong'}">
      <span>${correct ? '✓' : '✕'}</span>
      <div><b>${correct ? 'Correct.' : 'Not quite — correct answer highlighted above.'}</b></div>
    </div>`;
  renderQuizNav(SECTIONS.find(s=>s.id===activeQuiz.sectionId), true);
}

function recordAnswer(correct){
  if(correct) activeQuiz.score += 1;
  const p = ensureProgress(activeQuiz.sectionId)[activeQuiz.mode];
  p.done = Math.max(p.done, activeQuiz.idx+1);
  p.score = activeQuiz.score;
  p.idx = activeQuiz.idx;
  p.status = 'progress';
  saveState();
}

function renderQuizNav(section, revealed){
  const nav = document.getElementById('quizNav');
  const items = section[activeQuiz.mode];
  const isLast = activeQuiz.idx >= items.length-1;
  nav.innerHTML = `
    <span class="mono" style="font-size:0.75rem; color:var(--slate);">Score: ${activeQuiz.score}</span>
    <button class="btn btn-gold btn-sm" id="nextBtn" ${revealed? '' : 'disabled'}>${isLast ? 'Finish section' : 'Next question →'}</button>
  `;
  const nb = document.getElementById('nextBtn');
  if(nb) nb.addEventListener('click', ()=>{
    if(isLast){
      const p = ensureProgress(activeQuiz.sectionId)[activeQuiz.mode];
      p.status = 'done';
      p.score = activeQuiz.score;
      saveState();
      route = {screen:'results'};
      render();
    } else {
      activeQuiz.idx += 1;
      render();
    }
  });
}

/* ---------- RESULTS ---------- */
function renderResults(){
  const section = SECTIONS.find(s=>s.id===activeQuiz.sectionId);
  const items = section[activeQuiz.mode];
  const pct = Math.round((activeQuiz.score/items.length)*100);
  const wrap = document.createElement('div');
  wrap.className = 'wrap';
  wrap.innerHTML = `
    <div class="results-card">
      <div class="qkicker" style="text-align:center;">${section.title} · ${activeQuiz.mode==='short'?'Short Answer':'Multiple Choice'} complete</div>
      <div class="score-ring">${pct}%</div>
      <div class="results-sub">${activeQuiz.score} of ${items.length} correct</div>
      <div class="results-actions">
        <button class="btn btn-primary btn-sm" id="retryBtn">Retry this mode</button>
        <button class="btn btn-ghost btn-sm" id="homeBtn">Back to all topics</button>
      </div>
    </div>
  `;
  app.appendChild(wrap);
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    startOrResume(activeQuiz.sectionId, activeQuiz.mode);
  });
  document.getElementById('homeBtn').addEventListener('click', ()=>{
    route = {screen:'home'};
    render();
  });
}

/* ---------- utils ---------- */
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

render();
</script>
